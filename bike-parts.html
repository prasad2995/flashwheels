<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashWheels — Bike Parts & Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #FFFFFF;
            --bg-light: #F7F8FA;
            --black: #141412;
            --muted: #7A7872;
            --border: #EAEAEA;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--white); 
            color: var(--black); 
            -webkit-font-smoothing: antialiased; 
        }

        /* ── NAV (Consistent with index.html) ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 60px;
            background: rgba(255,255,255,0.98);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--black); text-decoration: none; }
        .logo em { font-style: normal; color: var(--muted); }
        nav ul { list-style: none; display: flex; gap: 40px; align-items: center; }
        nav ul a { font-size: 12px; font-weight: 400; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
        nav ul a:hover { color: var(--black); }
        .nav-cta { color: var(--white) !important; background: var(--black); padding: 10px 26px; font-weight: 500 !important; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; font-size: 12px; letter-spacing: .12em; text-transform: uppercase;}
        
        /* ── STORE LAYOUT ── */
        .store-wrapper { padding: 120px 60px 80px; max-width: 1400px; margin: 0 auto; }
        .store-header h1 { font-size: 36px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.02em; }
        
        /* ── FILTER TABS (Ola Style Pills) ── */
        .tabs { display: flex; gap: 12px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 8px; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            background: var(--white); border: 1px solid var(--border); border-radius: 40px;
            font-size: 14px; font-weight: 500; color: var(--muted); padding: 10px 24px; 
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .tab:hover { border-color: var(--black); color: var(--black); }
        .tab.active { background: var(--black); color: var(--white); border-color: var(--black); }

        /* ── PRODUCT GRID ── */
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px;
        }

        /* ── PRODUCT CARD ── */
        .product-card { display: flex; flex-direction: column; cursor: pointer; group; }
        .product-img-box {
            background: var(--bg-light); border-radius: 16px; height: 300px;
            display: flex; align-items: center; justify-content: center;
            padding: 24px; transition: transform 0.3s ease, background 0.3s ease;
        }
        .product-card:hover .product-img-box { transform: translateY(-4px); background: #F0F2F5; }
        .product-img-box svg { width: 100%; height: 100%; max-width: 140px; max-height: 140px; }
        
        .product-info { padding: 20px 4px 0; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 16px; font-weight: 500; color: var(--black); margin-bottom: 6px; }
        .product-price { font-size: 18px; font-weight: 700; color: var(--black); margin-bottom: 16px; }
        
        .add-btn {
            margin-top: auto; width: 100%; padding: 14px; border-radius: 8px;
            background: var(--bg-light); color: var(--black); border: none;
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .product-card:hover .add-btn { background: var(--black); color: var(--white); }

        /* ── RESPONSIVE ── */
        @media(max-width: 900px) {
            nav { padding: 16px 20px; }
            nav ul { gap: 12px; flex-wrap: wrap; }
            nav ul li a, nav ul li .nav-cta { font-size: 10px; padding: 8px 12px; }
            .store-wrapper { padding: 100px 20px 40px; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
            .product-img-box { height: 200px; border-radius: 12px; }
            .store-header h1 { font-size: 28px; }
            .tabs { margin-bottom: 24px; }
        }

        /* ── CART BADGE ── */
        .cart-badge {
            background-color: var(--white);
            color: var(--black) !important;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 8px;
            min-width: 20px;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav id="nav">
        <a href="index.html" class="logo">Flash<em>Wheels</em></a>
        <ul>
            <li><a href="index.html" class="nav-cta">Home</a></li>
            <li><a href="cart.html" class="nav-cta" id="cartBtn"><span style="position:relative;">🛒 Cart</span><span id="cartCount" style="display:none; position:absolute; top:-8px; right:-8px; background:#E8E6E1; color:#141412; font-size:11px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700;">0</span></a></li>
        </ul>
    </nav>

    <!-- STOREFRONT -->
    <main class="store-wrapper">
        <div class="store-header">
            <h1>Accessories & Parts</h1>
            <div class="tabs" id="categoryTabs">
                <button class="tab active" data-category="All">All Accessories</button>
                <button class="tab" data-category="Helmets">Helmets</button>
                <button class="tab" data-category="Upgrades">Tech & Upgrades</button>
                <button class="tab" data-category="Care">Bike Care</button>
                <button class="tab" data-category="Apparel">Apparel</button>
            </div>
        </div>

        <div class="product-grid" id="productGrid">
            <!-- Products rendered dynamically by JS -->
        </div>
    </main>

    <!-- Cart Script -->
    <script src="cart.js"></script>

    <script>
        // Dynamic Product Data
        const products = [
            { id: 1, name: 'Smart Commuter Helmet', price: '₹2,499', category: 'Helmets', icon: 'helmet' },
            { id: 2, name: 'Fast Charger 5A', price: '₹3,499', category: 'Upgrades', icon: 'charger' },
            { id: 3, name: 'All-Weather Bike Cover', price: '₹999', category: 'Care', icon: 'cover' },
            { id: 4, name: 'FlashWheels Riding Gloves', price: '₹1,299', category: 'Apparel', icon: 'shirt' },
            { id: 5, name: 'Premium Floor Mat', price: '₹799', category: 'Care', icon: 'cover' },
            { id: 6, name: 'Carbon Fiber Mirror Set', price: '₹1,499', category: 'Upgrades', icon: 'cover' },
            { id: 7, name: 'Aero Half-Face Helmet', price: '₹1,999', category: 'Helmets', icon: 'helmet' },
            { id: 8, name: 'Classic T-Shirt - Black', price: '₹699', category: 'Apparel', icon: 'shirt' }
        ];

        // Store products globally for easy access
        window.productsMap = {};
        products.forEach(p => {
            window.productsMap[p.id] = p;
        });

        // Helper to generate minimal clean SVGs representing products
        function getIconSVG(type) {
            const stroke = "#141412";
            if (type === 'helmet') {
                return `<svg viewBox="0 0 100 100" fill="none" stroke="${stroke}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 70 V50 C20 30 35 15 50 15 C65 15 80 30 80 50 V70 Z" fill="#fff" />
                    <path d="M20 70 H80" />
                    <path d="M50 15 V35" />
                    <rect x="40" y="35" width="20" height="15" rx="4" />
                </svg>`;
            } else if (type === 'charger') {
                return `<svg viewBox="0 0 100 100" fill="none" stroke="${stroke}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="30" y="20" width="40" height="50" rx="4" fill="#fff"/>
                    <path d="M40 70 V85 M60 70 V85" />
                    <circle cx="50" cy="45" r="8" />
                </svg>`;
            } else if (type === 'shirt') {
                return `<svg viewBox="0 0 100 100" fill="none" stroke="${stroke}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M25 20 L40 30 L50 35 L60 30 L75 20 L85 40 L70 50 V85 H30 V50 L15 40 Z" fill="#fff"/>
                </svg>`;
            } else {
                return `<svg viewBox="0 0 100 100" fill="none" stroke="${stroke}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="20" y="30" width="60" height="40" rx="4" fill="#fff"/>
                    <path d="M30 30 L50 15 L70 30" />
                    <circle cx="50" cy="50" r="6" />
                </svg>`;
            }
        }

        const tabs = document.querySelectorAll('.tab');
        const grid = document.getElementById('productGrid');

        // Render Products based on category
        function renderProducts(category) {
            grid.innerHTML = '';
            const filtered = category === 'All' ? products : products.filter(p => p.category === category);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="product-img-box">${getIconSVG(p.icon)}</div>
                        <div class="product-info">
                            <h3 class="product-title">${p.name}</h3>
                            <p class="product-price">${p.price}</p>
                            <button class="add-btn" data-product-id="${p.id}">Add to Cart</button>
                        </div>
                    </div>`;
            });

            // Attach event listeners to all add-to-cart buttons
            attachAddToCartListeners();
        }

        // Attach event listeners to add-to-cart buttons
        function attachAddToCartListeners() {
            const addBtns = grid.querySelectorAll('.add-btn');
            addBtns.forEach(btn => {
                btn.addEventListener('click', handleAddToCart);
            });
        }

        // Handle Add to Cart button click
        function handleAddToCart(event) {
            event.preventDefault();
            event.stopPropagation();

            const productId = parseInt(this.getAttribute('data-product-id'));
            const product = window.productsMap[productId];

            if (product) {
                // Add item to cart
                Cart.addItem(product);

                // Show success message
                Cart.showToast(`${product.name} added to cart!`, 2000);
            }
        }

        // Tab Click Listeners
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderProducts(e.target.dataset.category);
            });
        });

        // Initialize Default View
        renderProducts('All');
    </script>
</body>
</html>
