<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashWheels — Bike Parts & Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #FFFFFF;
            --bg-light: #F7F8FA;
            --black: #141412;
            --muted: #7A7872;
            --border: #EAEAEA;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--white); 
            color: var(--black); 
            -webkit-font-smoothing: antialiased; 
        }

        /* ── NAV (Consistent with index.html) ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 60px;
            background: rgba(255,255,255,0.98);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--black); text-decoration: none; }
        .logo em { font-style: normal; color: var(--muted); }
        nav ul { list-style: none; display: flex; gap: 40px; align-items: center; }
        nav ul a { font-size: 12px; font-weight: 400; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
        nav ul a:hover { color: var(--black); }
        .nav-cta { color: var(--white) !important; background: var(--black); padding: 10px 26px; font-weight: 500 !important; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; font-size: 12px; letter-spacing: .12em; text-transform: uppercase;}
        
        /* ── STORE LAYOUT ── */
        .store-wrapper { padding: 120px 60px 80px; max-width: 1400px; margin: 0 auto; }
        .store-header h1 { font-size: 36px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.02em; }
        
        /* ── FILTER TABS (Ola Style Pills) ── */
        .tabs { display: flex; gap: 12px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 8px; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            background: var(--white); border: 1px solid var(--border); border-radius: 40px;
            font-size: 14px; font-weight: 500; color: var(--muted); padding: 10px 24px; 
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .tab:hover { border-color: var(--black); color: var(--black); }
        .tab.active { background: var(--black); color: var(--white); border-color: var(--black); }

        /* ── PRODUCT GRID ── */
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px;
        }

        /* ── PRODUCT CARD ── */
        .product-card { display: flex; flex-direction: column; cursor: pointer; group; }
        .product-img-box {
            background: var(--bg-light); border-radius: 16px; height: 300px;
            display: flex; align-items: center; justify-content: center;
            padding: 24px; transition: transform 0.3s ease, background 0.3s ease;
        }
        .product-card:hover .product-img-box { transform: translateY(-4px); background: #F0F2F5; }
        .product-img-box svg { width: 100%; height: 100%; max-width: 140px; max-height: 140px; }
        
        .product-info { padding: 20px 4px 0; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 16px; font-weight: 500; color: var(--black); margin-bottom: 6px; }
        .product-price { font-size: 18px; font-weight: 700; color: var(--black); margin-bottom: 16px; }
        
        .add-btn {
            margin-top: auto; width: 100%; padding: 14px; border-radius: 8px;
            background: var(--bg-light); color: var(--black); border: none;
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .product-card:hover .add-btn { background: var(--black); color: var(--white); }

        /* ── RESPONSIVE ── */
        @media(max-width: 900px) {
            nav { padding: 16px 20px; }
            nav ul { gap: 12px; flex-wrap: wrap; }
            nav ul li a, nav ul li .nav-cta { font-size: 10px; padding: 8px 12px; }
            .store-wrapper { padding: 100px 20px 40px; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
            .product-img-box { height: 200px; border-radius: 12px; }
            .store-header h1 { font-size: 28px; }
            .tabs { margin-bottom: 24px; }
        }

        /* ── CART BADGE ── */
        .cart-badge {
            background-color: var(--white);
            color: var(--black) !important;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 8px;
            min-width: 20px;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav id="nav">
        <a href="index.html" class="logo">Flash<em>Wheels</em></a>
        <ul>
            <li><a href="index.html" class="nav-cta">Home</a></li>
            <li><a href="cart.html" class="nav-cta" id="cartBtn"><span style="position:relative;">🛒 Cart</span><span id="cartCount" style="display:none; position:absolute; top:-8px; right:-8px; background:#E8E6E1; color:#141412; font-size:11px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700;">0</span></a></li>
        </ul>
    </nav>

    <!-- STOREFRONT -->
    <main class="store-wrapper">
        <div class="store-header">
            <h1>Accessories & Parts</h1>
            <div class="tabs" id="categoryTabs">
                <button class="tab active" data-category="All">All Accessories</button>
                <button class="tab" data-category="Helmets">Helmets</button>
                <button class="tab" data-category="Upgrades">Tech & Upgrades</button>
                <button class="tab" data-category="Care">Bike Care</button>
                <button class="tab" data-category="Apparel">Apparel</button>
            </div>
        </div>

        <div class="product-grid" id="productGrid">
            <!-- Products rendered dynamically by JS -->
        </div>
    </main>

    <!-- TOAST NOTIFICATION ELEMENT -->
    <div id="toast"></div>

    <!-- Firebase & Cart Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="cart.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAQA8pQcKRv9hBACezKVPn9ffSQf6qvtx4",
            authDomain: "flashwheels-ad34d.firebaseapp.com",
            projectId: "flashwheels-ad34d",
            storageBucket: "flashwheels-ad34d.firebasestorage.app",
            messagingSenderId: "145924459464",
            appId: "1:145924459464:web:63c3f93251dfa9be238efd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let products = [];
        const tabs = document.querySelectorAll('.tab');
        const grid = document.getElementById('productGrid');

        // Fetch configured parts from Firestore
        db.collection('parts').onSnapshot(snapshot => {
            products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const activeTab = document.querySelector('.tab.active');
            renderProducts(activeTab ? activeTab.dataset.category : 'All');
        }, error => console.error("Error fetching parts:", error));

        function renderProducts(category) {
            grid.innerHTML = '';
            // Filter by model
            const filtered = category === 'All' ? products : products.filter(p => p.model === category || p.model === 'All Models');

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px;">No parts configured for this model yet.</p>';
                return;
            }
            
            filtered.forEach(p => {
                const discount = Number(p.discount) || 0;
                const price = Number(p.price) || 0;
                const discountedPrice = price - (price * discount / 100);

                let priceHtml = `₹${discountedPrice.toLocaleString('en-IN')}`;
                if (discount > 0) {
                    priceHtml += ` <span style="text-decoration:line-through; color:var(--muted); font-size:12px; margin-left:8px;">₹${price.toLocaleString('en-IN')}</span>`;
                }
                grid.innerHTML += `
                    <div class="product-card">
                          <div class="product-img-box" style="padding:0; overflow:hidden;">
                             ${p.image ? `<img src="${p.image}" alt="${p.item}" style="width:100%; height:100%; object-fit:cover; border-radius:16px;">` : `<div style="color:var(--muted)">No Image</div>`}
                         </div>
                        <div class="product-info">
                             <h3 class="product-title">${p.item}</h3>
                             <p style="font-size:12px; color:var(--muted); margin-bottom:4px;">${p.model}</p>
                             <p class="product-price">${priceHtml}</p>
                             <button class="add-btn" onclick="addToCart('${p.id}', '${p.item.replace(/'/g, "\\'")}', ${discountedPrice}, '${p.image || ''}')">Add to Cart</button>
                         </div>
                    </div>`;
            });
        }

        // Add to Cart Logic
        window.addToCart = function(id, name, price, image) {
            if (typeof Cart !== 'undefined') {
                Cart.addItem({ id, name, price, image });
                Cart.showToast(name + ' added to cart!');
            } else {
                console.error('Cart script not loaded properly.');
            }
        };

        // Tab Click Listeners
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderProducts(e.target.dataset.category);
            });
        });

        // Initialize Default View
        renderProducts('All');
    </script>
    <footer style="text-align: center; padding: 24px 20px; font-size: 13px; color: #7A7872; background: #ffffff; border-top: 1px solid #EAEAEA; width: 100%; box-sizing: border-box;">
        Designed and developed by Punnam Tech Solutions Pvt Ltd.
    </footer>
</body>
</html>
